# config.yaml
# Biological inputs for the extraction step ONLY.
# Cluster / scheduling concerns live in config.sh.

inputs:
  genome_fasta: /path/to/genome.fa
  annotation_gff: /path/to/annotation.gff3
  gene_list: /path/to/gene_ids.txt

outputs:
  output_dir: extracted_regions
  output_mode: multifasta          # 'multifasta' (canonical) or 'individual' (debug only)
  min_utr_length: 30               # records with shorter UTRs are flagged but still written
  filter_short_utrs: false         # set true to drop instead of flag
  codon_flank_length: 30           # ±N nt around start/stop codons
  tail_length: 100                 # length of 3' tail region

processing:
  isoform_priority:                # checked in order; first match wins; falls back to longest CDS
    - "appris_principal_1"
    - "appris_principal_2"
    - "appris_principal_3"
    - "Ensembl_canonical"
    - "MANE_Select"
  regions_to_extract:
    - mRNA
    - CDS
    - 5UTR
    - 3UTR
    - start_codon_region
    - stop_codon_region
    - tail_region
